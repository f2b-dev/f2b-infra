# 灵境云本地全栈：f2b-sandbox (Fake) + f2b-web (BFF + 控制台)
#
# 前置：与 f2b-infra 同级已有 f2b-spec、f2b-sandbox、f2b-web 目录：
#   revocloud/
#     f2b-infra/   ← 在此执行 compose
#     f2b-spec/
#     f2b-sandbox/
#     f2b-web/
#
#   cd f2b-infra && docker compose up --build
#
# 访问：
#   官网/控制台  http://localhost:13200
#   沙箱 API     http://localhost:13287/healthz

name: f2b

services:
  sandbox:
    build:
      context: ..
      dockerfile: f2b-infra/docker/sandbox/Dockerfile
    ports:
      - "${F2B_SANDBOX_PORT:-13287}:13287"
    environment:
      F2B_SANDBOX_BACKEND: ${F2B_SANDBOX_BACKEND:-fake}
      DATABASE_URL: file:/data/f2b-sandbox.db
      PORT: "13287"
      HOST: "0.0.0.0"
    volumes:
      - sandbox-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:13287/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: f2b-infra/docker/web/Dockerfile
    ports:
      - "${F2B_WEB_PORT:-13200}:13200"
    environment:
      F2B_SANDBOX_URL: http://sandbox:13287
      PORT: "13200"
      HOSTNAME: "0.0.0.0"
    depends_on:
      sandbox:
        condition: service_healthy

volumes:
  sandbox-data:
